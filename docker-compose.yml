version: "3.9"

services:
  backend:
    build: ./ran-backend
    ports:
      - "3000:3000"
    env_file: ./ran-backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./ran-frontend
      args:
        NEXT_PUBLIC_API_ENDPOINT_URL: http://backend:3000
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped
